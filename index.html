<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0a0a">
<title>Tennis Point - Plataforma Oficial de Tênis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=4.12.8">

<!-- Favicon (aba do navegador) -->
<link rel="icon" type="image/svg+xml" href="favicon/favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="favicon/favicon-96x96.png">
<link rel="shortcut icon" href="favicon/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">

<!-- PWA manifest (instalar como app) -->
<link rel="manifest" href="manifest.json">

<style>
  /* Critical CSS — DARK por padrão, SVG limitado, app-shell visível por padrão */
  html, body { margin: 0; padding: 0; background: #0e0e0e; color: #f5f5f5; font-family: 'Inter', -apple-system, sans-serif; min-height: 100vh; }
  svg { max-width: 100%; height: auto; vertical-align: middle; }
  .brand-mark svg, svg.icon { width: 32px; height: 32px; }
  /* Tela de login só aparece se .active */
  #screen-login { display: none; }
  #screen-login.active { display: flex; }
  /* App shell visível por padrão, escondido só se .hidden */
  #app-shell { display: flex; flex-direction: column; min-height: 100vh; }
  #app-shell.hidden { display: none !important; }
  .screen { min-height: 100vh; }
</style>
</head>
<body>

<!-- ========== TELA DE LOGIN ========== -->
<section id="screen-login" class="screen active">
  <div class="login-bg"></div>
  <div class="login-container">
    <div class="login-brand">
      <div class="brand-mark">
        <img src="logo.png" alt="Tennis Point" style="width:80px;height:80px;object-fit:contain;border-radius:16px;display:block">
      </div>
      <h1 class="brand-name">TENNIS <em>POINT</em></h1>
      <p class="brand-tag">Plataforma Oficial de Tênis</p>
    </div>

    <div class="login-card">
      <h2>Bem-vindo!</h2>
      <p class="login-sub">Selecione seu tipo de acesso</p>

      <div class="role-toggle">
        <button class="role-btn active" data-role="member">🎾 Membro</button>
        <button class="role-btn" data-role="admin">🔑 Administrador</button>
      </div>

      <div class="login-form">
        <div class="field">
          <label>E-mail</label>
          <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="field">
          <label>Senha</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        </div>
        <button class="btn-primary btn-block" id="btn-login">Entrar</button>
      </div>

      <div class="login-divider"><span>ou continue com</span></div>

      <div class="social-row">
        <button class="btn-social"><span>G</span> Google</button>
        <button class="btn-social"><span>🍎</span> Apple</button>
      </div>
    </div>
  </div>
</section>

<!-- ========== APP SHELL ========== -->
<div id="app-shell" class="app-shell hidden">

  <!-- TOPBAR -->
  <header class="topbar">
    <button class="icon-btn" id="btn-menu" aria-label="Menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="topbar-brand">
      <img src="logo.png" alt="" style="width:24px;height:24px;object-fit:contain;border-radius:6px;vertical-align:middle;margin-right:8px">
      TENNIS <em>POINT</em>
    </div>
    <button class="icon-btn notif-btn" id="btn-notif" aria-label="Notificações">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-badge" id="notif-count">2</span>
    </button>
  </header>

  <!-- DRAWER -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="drawer-avatar" id="drawer-avatar">TP</div>
      <div>
        <div class="drawer-name" id="drawer-name">Membro</div>
        <div class="drawer-cat" id="drawer-cat">🎾 Categoria 5ªA</div>
      </div>
    </div>
    <nav class="drawer-nav">
      <a class="drawer-link" data-screen="home">🏠 Início</a>
      <a class="drawer-link" data-screen="tournament">🏆 Torneio</a>
      <a class="drawer-link" data-screen="courts">📅 Quadras</a>
      <div class="drawer-sep"></div>
      <a class="drawer-link" data-screen="settings">⚙️ Configurações</a>
      <a class="drawer-link" data-screen="notifications">🔔 Notificações</a>
      <a class="drawer-link" data-screen="profile">👤 Meu perfil</a>
      <a class="drawer-link" data-screen="help">❓ Ajuda</a>
      <a class="drawer-link" id="btn-logout">↪️ Sair</a>
    </nav>
    <div class="drawer-footer">Tennis Point v4.12.8</div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main-content" id="main-content">
    <!-- Telas inseridas dinamicamente -->
  </main>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="nav-btn active" data-screen="home"><span>🏠</span><label>Início</label></button>
    <button class="nav-btn" data-screen="tournament"><span>🏆</span><label>Torneio</label></button>
    <button class="nav-btn nav-center" data-screen="play"><span class="nav-center-icon">🎾</span></button>
    <button class="nav-btn" data-screen="courts"><span>📅</span><label>Quadras</label></button>
    <button class="nav-btn" data-screen="profile"><span>👤</span><label>Perfil</label></button>
  </nav>

</div>

<!-- ========== TOAST CONTAINER ========== -->
<div class="toast-container" id="toast-container"></div>

<!-- ========== MODAL CONTAINER ========== -->
<div class="modal-overlay" id="modal-overlay"></div>
<div class="modal-host" id="modal-host"></div>

<!-- ========== CARROSSEL DE PATROCINADORES (fixo na base, visível em login + app) ========== -->
<aside class="sponsors-bar" id="sponsors-bar" aria-label="Patrocinadores">
  <div class="sponsors-header">PATROCINADORES</div>
  <div class="sponsors-marquee">
    <!-- Track duplicado pra loop infinito sem corte -->
    <div class="sponsors-track">
      <a class="sponsor-chip"><img src="sponsors/sponsor-01.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-02.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-03.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-04.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-05.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-06.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-07.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-08.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-09.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-10.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-11.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-12.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-13.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip"><img src="sponsors/sponsor-14.png" alt="" loading="lazy"></a>
      <!-- Duplicado pra loop infinito (translateX -50% perfeito) -->
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-01.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-02.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-03.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-04.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-05.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-06.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-07.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-08.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-09.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-10.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-11.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-12.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-13.png" alt="" loading="lazy"></a>
      <a class="sponsor-chip" aria-hidden="true"><img src="sponsors/sponsor-14.png" alt="" loading="lazy"></a>
    </div>
  </div>
</aside>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js?v=4.12.8"></script>
<script src="data.js?v=4.12.8"></script>
<script src="bracket.js?v=4.12.8"></script>
<script src="bracket-builder.js?v=4.12.8"></script>
<script src="app.js?v=4.12.8"></script>
<script>
  // PWA: registra SW pass-through pra habilitar instalação no Android Chrome
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(console.error);
  }
</script>
</body>
</html>
